<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace modèles — Quartier Noble</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="espace-single-mode">
  <header class="header header-annonce scrolled">
    <a href="index.html" class="logo">Quartier Noble</a>
    <nav class="espace-nav" id="espace-nav" aria-label="Rubriques de l'espace"></nav>
    <nav class="espace-nav-mobile" id="espace-nav-mobile" aria-label="Sections"></nav>
    <div class="annonce-header-actions">
      <a href="index.html" class="annonce-back" data-locale="espacePrivePage.back">Retour au site</a>
      <button type="button" class="btn btn-ghost btn-sm" id="annonce-logout" data-locale="espacePrivePage.logout">Déconnexion</button>
    </div>
  </header>

  <main class="section section-annonce">
    <div class="annonce-page-bg" aria-hidden="true"></div>
    <div class="container annonce-container">
      <div class="espace-board espace-single-board" id="espace-single-view" aria-live="polite"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p class="footer-logo">Quartier Noble</p>
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="annonce.js"></script>
</body>
</html>
